<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Class Weapon</title>

<style>

body{
  font-family:sans-serif;
  padding:10px;
  margin:0;
}

h2{
  margin-top:15px;
  font-size:16px;
  border-bottom:1px solid #ccc;
  padding-bottom:4px;
}

textarea,input{
  width:100%;
  margin-top:5px;
  padding:6px;
  box-sizing:border-box;
}

button{
  margin-top:5px;
  padding:6px;
  width:100%;
  cursor:pointer;
}

.result{
  background:#f5f5f5;
  padding:6px;
  margin-top:5px;
  min-height:40px;
  border:1px solid #ccc;
}

/* ========================== */
/* タイ語だけ見やすく調整 */
.translated {
  font-size: 1.3em;    /* 少し小さめに */
  font-weight: normal;  /* 太すぎない */
  line-height: 1.3;    /* 詰まりすぎない */
}

.section{
  margin-bottom:20px;
}

.wordRow{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
  padding:3px 0;
  cursor:pointer;
}

</style>

</head>

<body>

<!-- ===== 授業翻訳 ===== -->
<div class="section">
<h2>授業翻訳</h2>
<textarea id="jpInput" placeholder="日本語を入力"></textarea>
<button id="translateBtn">翻訳する</button>
<div class="result" id="translateResult"></div>
</div>

<!-- ===== 辞書 ===== -->
<div class="section">
<h2>単語辞書</h2>
<input id="dictInput" type="text" placeholder="単語を入力">
<button id="dictBtn">辞書検索</button>
<div class="result" id="dictResult"></div>
</div>

<!-- ===== 文サポート ===== -->
<div class="section">
<h2>文サポート</h2>
<textarea id="sentenceInput" placeholder="例文を入力"></textarea>
<button id="sentenceBtn">文サポート</button>
<div class="result" id="sentenceResult"></div>
</div>

<script src="panel.js"></script>

</body>
</html>
